<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capítulo 3 - Atividades CSS</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Helvetica, Arial, sans-serif;
            background-color:#f5f5f5;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:#fff;
            width:500px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.1);
            text-align:center;
        }

        h1{
            color:#C0262C;
            margin-bottom:15px;
        }

        p{
            margin-bottom:30px;
            color:#555;
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .btn{
            text-decoration:none;
            background:#C0262C;
            color:white;
            padding:15px;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#9b1e23;
            transform:translateY(-2px);
        }

        footer{
            margin-top:30px;
            color:#777;
            font-size:14px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Capítulo 3 - CSS</h1>

        <p>
            Escolha uma das atividades para visualizar.
        </p>

        <div class="menu">

            <a href="quemsomos.html" class="btn">
                Atividade 2 - Quem Somos
            </a>

            <a href="curiosidades.html" class="btn">
                Atividade 3 - Curiosidades
            </a>

        </div>

        <footer>
            Exercícios de CSS - Fontes, Texto, Fundo, Listas e Links
        </footer>

    </div>

</body>
</html>
