<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Curiosidades</title>

<link rel="stylesheet" href="principal.css">

<style type="text/css">

h2{
    background-color: #C0262C;

    background-image:
    url("multimidia/importantesaber.jpg"),
    url("multimidia/back-bolinha.gif");

    background-repeat:
    no-repeat,
    repeat;

    background-position:
    right center,
    center;

    color: #FFFFFF;

    font-size: 2.5em;
    letter-spacing: .1em;

    width: 470px;

    padding: 61px 400px 61px 100px;
}

figure{
    border: thin solid #C0262C;

    border-radius: 35px 35px 0 0;

    margin: 20px 0 0;

    text-align: center;
}

figcaption{
    background-color: #C0262C;

    color: #FFFFFF;

    padding: 7px 0;

    font-size: 1.5em;
}

ul li{
    list-style-type: none;

    list-style-image: url("multimidia/ossinho.png");

    list-style-position: inside;

    margin: 30px 0;
}

dt{
    color: #FFFFFF;

    background-color: #C0262C;

    padding: 7px;
}

dd{
    border: thin solid #C0262C;

    border-radius: 0 0 25px 25px;

    margin-top: -3px;
    margin-bottom: 30px;

    padding: 20px 20px 0;
}

ol{
    list-style-type: none;

    white-space: pre;

    line-height: .9em;

    counter-reset: contador;
}

ol li:before{
    color: #999999;

    counter-increment: contador;

    content: "Questão " counter(contador) " \00BB ";
}

ul a{
    text-decoration: none;

    color: #C0262C;

    font-weight: bold;

    padding: 7px;
}

ul a:hover{
    text-decoration: underline;
}

a[target="_blank"]{
    text-decoration: none;

    color: #C0262C;

    font-weight: bold;

    padding: 7px;

    display: inline-block;
}

a[target="_blank"]:hover{
    text-decoration: underline;
}

a[href="#top"]{
    text-decoration: none;

    color: #C0262C;

    font-weight: bold;

    padding: 7px 0 7px 30px;

    background-image: url("multimidia/seta-voltar.png");

    background-repeat: no-repeat;

    background-position: left center;
}

a[href="#top"]:hover{
    text-decoration: underline;

    background-image: url("multimidia/seta-voltar-hover.png");

    background-repeat: no-repeat;

    background-position: left center;
}

</style>

</head>

</body>
</html>
